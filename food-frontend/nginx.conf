# Nginx config baked into the frontend image.
# Serves the React build and proxies /api to the backend container so the two
# share an origin (no CORS needed). "backend" is the compose service name.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the Spring Boot container.
    location /api/ {
        proxy_pass http://backend:8081;
        # Frontend and backend share this origin, so these calls are genuinely
        # same-origin. Drop the browser's Origin header (Chrome sends it on POST/
        # PUT/DELETE) so the backend's CORS filter treats them as non-CORS and
        # doesn't 403 them against its dev-only allowed origin.
        proxy_set_header Origin "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
