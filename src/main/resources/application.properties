spring.application.name=E-commerce-food-system

# Database (override via env vars in production)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/e_commerce_system}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Server Port (FIX ADDED)
server.port=8081

# Bakong KHQR (override via env vars in production — NEVER commit a real token)
# Get account-id + api-token from https://api-bakong.nbc.gov.kh
bakong.api-url=${BAKONG_API_URL:https://api-bakong.nbc.gov.kh}
bakong.account-id=${BAKONG_ACCOUNT_ID:your_name@bank}
bakong.api-token=${BAKONG_API_TOKEN:REPLACE_WITH_YOUR_TOKEN}
bakong.merchant-name=${BAKONG_MERCHANT_NAME:Food System}
bakong.merchant-city=${BAKONG_MERCHANT_CITY:Phnom Penh}
bakong.currency=${BAKONG_CURRENCY:USD}