# Full stack: MySQL + Spring Boot backend + Nginx-served React frontend.
# Usage:
#   cp .env.example .env   # then edit the passwords
#   docker compose up -d --build
# App is served on http://localhost:8080  (frontend proxies /api to backend).

services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: e_commerce_system
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    environment:
      DB_URL: jdbc:mysql://db:3306/e_commerce_system
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    # Exposed only to the frontend container; not published to the host.
    expose:
      - "8081"

  frontend:
    build: ./food-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db-data:
