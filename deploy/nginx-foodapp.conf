# Nginx site for the E-Commerce Food System.
# Serves the built React frontend (food-frontend/dist) and reverse-proxies
# /api to the Spring Boot JAR on localhost:8081. Frontend and API share an
# origin, so no CORS configuration is required.
#
# Install: copy to /etc/nginx/sites-available/foodapp, then
#   sudo ln -s /etc/nginx/sites-available/foodapp /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;

    root /var/www/foodapp;
    index index.html;

    # React Router: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the Spring Boot JAR.
    location /api/ {
        proxy_pass http://localhost:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
